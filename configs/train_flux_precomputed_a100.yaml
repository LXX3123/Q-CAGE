_base_: qcage_base.yaml

model:
  generator:
    backend: diffusers_flux_precomputed
    model_id: black-forest-labs/FLUX.1-dev
    pipeline_class: FluxPipeline
    freeze: true
    dit_hidden_dim: 4096

data:
  train_jsonl: data/train_precomputed_flux.jsonl
  val_jsonl: data/val_precomputed_flux.jsonl
  image_root: .
  use_cached_features: true
  num_workers: 8

training:
  output_dir: checkpoints/qcage_flux_precomputed
  epochs: 3
  max_steps: null
  batch_size_per_gpu: 1
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-4
  weight_decay: 0.01
  precision: bf16
  log_every: 10
  save_every: 1000

